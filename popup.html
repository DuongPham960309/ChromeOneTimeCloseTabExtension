<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 220px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        h4 { margin-top: 0; color: #d32f2f; }
        .hidden { display: none; }
        .controls { margin-top: 15px; display: flex; justify-content: space-between; gap: 10px; }
        button { cursor: pointer; padding: 6px 12px; border-radius: 4px; border: 1px solid #ccc; }
        #save-btn { background-color: #4CAF50; color: white; border: none; }
        #cancel-btn { background-color: #f44336; color: white; border: none; }
        input[type="time"] { width: 100%; padding: 5px; box-sizing: border-box; }
        .time-display { font-size: 1.2em; font-weight: bold; color: #1976d2; margin: 10px 0; display: block; }
    </style>
</head>
<body>
    <div id="setup-view">
        <h4>Hẹn giờ đóng tab</h4>
        <input type="time" id="timer-input">
        <div class="controls">
            <button id="save-btn">Xác nhận</button>
            <button id="exit-btn-1">Thoát</button>
        </div>
    </div>

    <div id="status-view" class="hidden">
        <h4>Lịch hẹn hiện tại</h4>
        <span id="scheduled-time" class="time-display">--:--</span>
        <div class="controls">
            <button id="delete-btn">Hủy hẹn giờ</button>
            <button id="exit-btn-2">Thoát</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
